{% extends "base.html" %}
{% block title %}Participants{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Participants</h1>
<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
  {% for pid in participants %}
  <a
    href="/session/{{ pid }}"
    class="bg-white rounded-md shadow px-4 py-3 font-medium hover:bg-blue-50 hover:text-blue-700 transition-colors"
  >
    {{ pid }}
  </a>
  {% else %}
  <p class="text-gray-500 col-span-full">No participants found.</p>
  {% endfor %}
</div>
{% endblock %}
