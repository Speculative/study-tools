{% extends "base.html" %}
{% block title %}{{ pid }}{% endblock %}
{% block content %}
<a href="/" class="text-sm text-blue-600">← Participants</a>
<h1 class="text-2xl font-bold mb-4">{{ pid }}</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
  <!-- Video player -->
  <div class="md:col-span-2">
    <div id="player-target" class="rounded-md overflow-hidden bg-black"></div>

    <script type="module">
      import {
        VidstackPlayer,
        VidstackPlayerLayout,
      } from "https://cdn.vidstack.io/player";

      async function initPlayer() {
        const player = await VidstackPlayer.create({
          target: "#player-target",
          title: {{ pid|tojson }},
          src: {{ ("/video/" + pid)|tojson }},
          layout: new VidstackPlayerLayout({}),
        });
        window.__vds = player;
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initPlayer);
      } else {
        initPlayer();
      }
    </script>
  </div>

  <!-- Transcript -->
  <div class="md:col-span-1">
    <div class="bg-white rounded-md shadow">
      <div class="px-4 py-3 border-b font-semibold">Transcript</div>
      <div class="max-h-[70vh] overflow-y-auto">
        <table class="min-w-full text-sm">
          <thead class="sticky top-0 bg-white">
            <tr>
              <th class="text-left px-4 py-2 w-20">Time</th>
              <th class="text-left px-4 py-2 w-24">Speaker</th>
              <th class="text-left px-4 py-2">Text</th>
            </tr>
          </thead>
          <tbody>
            {% for utt in utterances %}
            <tr
              class="hover:bg-gray-50 cursor-pointer border-t border-gray-100"
              data-start="{{ utt.start_seconds }}"
            >
              <td class="px-4 py-2 text-gray-500 whitespace-nowrap">{{ utt.start_ts }}</td>
              <td class="px-4 py-2 font-medium whitespace-nowrap">{{ utt.speaker }}</td>
              <td class="px-4 py-2">{{ utt.text }}</td>
            </tr>
            {% else %}
            <tr>
              <td class="px-4 py-3 text-gray-500" colspan="3">No transcript available.</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  function attachTranscriptHandlers() {
    document.querySelectorAll("tbody tr[data-start]").forEach((row) => {
      row.addEventListener("click", () => {
        const player = window.__vds;
        const start = parseFloat(row.getAttribute("data-start"));
        if (Number.isFinite(start) && player) {
          player.currentTime = start;
          player.play();
        }
      });
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", attachTranscriptHandlers);
  } else {
    attachTranscriptHandlers();
  }
</script>
{% endblock %}
